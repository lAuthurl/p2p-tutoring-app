# -------------------------------
# User
# -------------------------------
type User @model
  @auth(rules: [
    { allow: owner, operations: [create, read, update, delete] },
    { allow: public, operations: [read] }
  ])
{
  id: ID!
  username: String!
  email: String!
  phoneNumber: String
  profilePicture: String
  deviceToken: String
  isEmailVerified: Boolean
  isProfileActive: Boolean
  role: String
  verificationStatus: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime
  skills: [String]
  about: String
  profileCompleted: Boolean @default(value: "false")

  # Relationships
  bookings: [Booking] @hasMany(indexName: "byUser", fields: ["id"])
  bookingItems: [BookingItem] @hasMany(indexName: "byUser", fields: ["id"])
  reviews: [Review] @hasMany(indexName: "byUser", fields: ["id"]) 
}

# -------------------------------
# Tutor
# -------------------------------
type Tutor @model
  @auth(rules: [
    { allow: owner, operations: [create, read, update, delete] },
    { allow: public, operations: [read] }
  ])
{
  id: ID!
  name: String!
  email: String!
  image: String              # needed for providerImage
  skills: [String]
  about: String

  # Relationships
  tutoringSessions: [TutoringSession] @hasMany(indexName: "byTutor", fields: ["id"])
  reviews: [Review] @hasMany(indexName: "byTutor", fields: ["id"])
}

# -------------------------------
# Subject
# -------------------------------
type Subject @model
  @auth(rules: [
    { allow: owner, operations: [create, read, update, delete] },
    { allow: public, operations: [read] }
  ])
{
  id: ID!
  name: String!
  description: String
  icon: String
  thumbnail: String
  isFeatured: Boolean

  # Relationship with index on child
  tutoringSessions: [TutoringSession] @hasMany(indexName: "bySubject", fields: ["id"])
}

# -------------------------------
# TutoringSession
# -------------------------------
type TutoringSession @model
  @auth(rules: [
    { allow: owner, operations: [create, read, update, delete] }, # tutor owns session
    { allow: public, operations: [read] }
  ])
{
  id: ID!

  tutorId: ID! @index(name: "byTutor")  # needed for Tutor → TutoringSession
  subjectId: ID! @index(name: "bySubject")   # index for Subject → TutoringSession

  # Relationships
  tutor: Tutor @belongsTo(fields: ["tutorId"])
  subject: Subject @belongsTo(fields: ["subjectId"])
  sessionAttributes: [SessionAttribute] @hasMany(indexName: "bySession", fields: ["id"])
  bookings: [Booking] @hasMany(indexName: "bySession", fields: ["id"])
  reviews: [Review] @hasMany(indexName: "bySession", fields: ["id"])

  # Session details
  title: String!
  description: String
  thumbnail: String
  images: [String]
  pricePerSession: Float
  isFeatured: Boolean
  hasPaid: Boolean @default(value: "false")

  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

# -------------------------------
# Booking
# -------------------------------
type Booking @model
  @auth(rules: [
    { allow: owner, operations: [create, read, update, delete] }, # student owns booking
    { allow: public, operations: [read] }
  ])
{
  id: ID!

  userId: ID! @index(name: "byUser")   # index for User → Booking
  user: User @belongsTo(fields: ["userId"])

  sessionId: ID! @index(name: "bySession")   # index for TutoringSession → Booking
  #   ^ required for the centralized TutoringSession.bookings

  # BookingItems relationship
  bookingItems: [BookingItem] @hasMany(indexName: "byBooking", fields: ["id"])

  selectedOptions: AWSJSON   # {"Duration":"2hr","Mode":"Online"}

  totalPrice: Float
  status: String

  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

# -------------------------------
# BookingItem
# -------------------------------
type BookingItem @model
  @auth(rules: [
    { allow: owner, operations: [create, read, update, delete] },
    { allow: public, operations: [read] }
  ])
{
  id: ID!

  userId: ID! @index(name: "byUser")  # index for User → BookingItem
  user: User @belongsTo(fields: ["userId"])

  bookingId: ID! @index(name: "byBooking", sortKeyFields: ["createdAt"])  # composite index
  booking: Booking @belongsTo(fields: ["bookingId"])

  sessionId: ID
  tutorId: ID

  bookingDate: AWSDateTime
  timeSlot: String
  price: Float
  quantity: Int
  negotiatedPrice: Float
  applyDiscount: Boolean
  isPhysical: Boolean
  serviceTitle: String
  serviceImage: String
  providerName: String
  providerImage: String

  selectedAttributes: AWSJSON

  hasPaid: Boolean @default(value: "false")

  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

# -------------------------------
# SessionAttribute
# -------------------------------
type SessionAttribute @model
  @auth(rules: [
    { allow: owner, operations: [create, read, update, delete] },
    { allow: public, operations: [read] }
  ])
{
  id: ID!

  tutorId: ID!
  sessionId: ID! @index(name: "bySession")   # index for TutoringSession → SessionAttribute
  name: String!
  values: [String]

  session: TutoringSession @belongsTo(fields: ["sessionId"])

  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

# -------------------------------
# Review
# -------------------------------
type Review @model
  @auth(rules: [
    { allow: owner, operations: [create, read, update, delete] },
    { allow: public, operations: [read] }
  ])
{
  id: ID!

  # Who wrote it
  userId: ID! @index(name: "byUser")
  user: User @belongsTo(fields: ["userId"])

  # Session reviewed
  sessionId: ID! @index(name: "bySession")

  # Tutor reviewed (same tutor who owns session)
  tutorId: ID! @index(name: "byTutor")
  tutor: Tutor @belongsTo(fields: ["tutorId"])

  rating: Float!
  comment: String

  createdAt: AWSDateTime
}

# -------------------------------
# Chat Message
# -------------------------------
type ChatMessage @model
  @auth(rules: [
    { allow: owner, operations: [create, read] },   # sender can create/read
    { allow: public, operations: [read] }           # other users can read
  ])
{
  id: ID!
  sessionId: ID!         # TutoringSession.id
  senderId: ID!          # User.id of the sender
  senderName: String
  text: String
  isVoice: Boolean
  audioUrl: String       # S3 URL if voice message
  createdAt: AWSDateTime
}