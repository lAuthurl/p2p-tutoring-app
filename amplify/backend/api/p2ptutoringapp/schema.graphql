# -------------------------------
# User
# -------------------------------
type User @model
  @auth(rules: [
    { allow: owner, operations: [create, read, update, delete] },
    { allow: public, operations: [read] }
  ])
{
  id: ID!
  username: String!
  email: String!
  phoneNumber: String
  profilePicture: String
  deviceToken: String
  isEmailVerified: Boolean
  isProfileActive: Boolean
  role: String
  verificationStatus: String
  createdAt: AWSDateTime
  updatedAt: AWSDateTime

  # Relationships
  bookings: [Booking] @hasMany(fields: ["id"])
  bookingItems: [BookingItem] @hasMany(fields: ["id"])
}

# -------------------------------
# Tutor
# -------------------------------
type Tutor @model
  @auth(rules: [
    { allow: owner, operations: [create, read, update, delete] },
    { allow: public, operations: [read] }
  ])
{
  id: ID!
  name: String!
  email: String!
  image: String              # needed for providerImage

  # Relationships
  tutoringSessions: [TutoringSession] @hasMany(fields: ["id"])
}

# -------------------------------
# Subject
# -------------------------------
type Subject @model
  @auth(rules: [
    { allow: owner, operations: [create, read, update, delete] },
    { allow: public, operations: [read] }
  ])
{
  id: ID!
  name: String!
  description: String
  icon: String
  thumbnail: String
  isFeatured: Boolean

  # Relationship with index on child
  tutoringSessions: [TutoringSession] @hasMany(indexName: "bySubject", fields: ["id"])
}

# -------------------------------
# TutoringSession
# -------------------------------
type TutoringSession @model
  @auth(rules: [
    { allow: owner, operations: [read, update, delete] }, # tutor owns session
    { allow: public, operations: [read] }
  ])
{
  id: ID!

  tutorId: ID!
  subjectId: ID! @index(name: "bySubject")   # index for Subject → TutoringSession

  # Relationships
  tutor: Tutor @belongsTo(fields: ["tutorId"])
  subject: Subject @belongsTo(fields: ["subjectId"])
  sessionAttributes: [SessionAttribute] @hasMany(fields: ["id"])
  sessionVariations: [SessionVariation] @hasMany(fields: ["id"])
  bookings: [Booking] @hasMany(indexName: "bySession", fields: ["id"])

  # Session details
  title: String!
  description: String
  thumbnail: String
  images: [String]
  pricePerSession: Float
  isFeatured: Boolean

  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

# -------------------------------
# Booking
# -------------------------------
type Booking @model
  @auth(rules: [
    { allow: owner, operations: [create, read, update, delete] }, # student owns booking
    { allow: public, operations: [read] }
  ])
{
  id: ID!

  userId: ID! @index(name: "byUser")   # index for User → Booking
  user: User @belongsTo(fields: ["userId"])

  sessionId: ID! @index(name: "bySession")   # index for TutoringSession → Booking
  #   ^ required for the centralized TutoringSession.bookings

  # BookingItems relationship
  bookingItems: [BookingItem] @hasMany(indexName: "byBooking", fields: ["id"])

  totalPrice: Float
  status: String

  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

# -------------------------------
# BookingItem
# -------------------------------
type BookingItem @model
  @auth(rules: [
    { allow: owner, operations: [create, read, update, delete] },
    { allow: public, operations: [read] }
  ])
{
  id: ID!

  userId: ID! @index(name: "byUser")  # index for User → BookingItem
  user: User @belongsTo(fields: ["userId"])

  bookingId: ID! @index(name: "byBooking", sortKeyFields: ["createdAt"])  # composite index
  booking: Booking @belongsTo(fields: ["bookingId"])

  sessionId: ID
  tutorId: ID

  bookingDate: AWSDateTime
  timeSlot: String
  price: Float
  quantity: Int
  negotiatedPrice: Float
  applyDiscount: Boolean
  isPhysical: Boolean
  serviceTitle: String
  serviceImage: String
  providerName: String
  providerImage: String

  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

# -------------------------------
# SessionAttribute
# -------------------------------
type SessionAttribute @model
  @auth(rules: [
    { allow: owner, operations: [create, read, update, delete] },
    { allow: public, operations: [read] }
  ])
{
  id: ID!

  tutorId: ID!
  sessionId: ID! @index(name: "bySession")   # index for TutoringSession → SessionAttribute
  name: String!
  values: [String]

  session: TutoringSession @belongsTo(fields: ["sessionId"])

  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}

# -------------------------------
# SessionVariation
# -------------------------------
type SessionVariation @model
  @auth(rules: [
    { allow: owner, operations: [create, read, update, delete] },
    { allow: public, operations: [read] }
  ])
{
  id: ID!

  tutorId: ID!
  sessionId: ID! @index(name: "bySession")   # index for TutoringSession → SessionVariation

  availableSeats: Int
  pricePerSession: Float
  lectureTime: AWSDateTime
  image: String
  metadata: String

  sessionAttributes: [SessionAttribute] @hasMany(fields: ["id"])
  session: TutoringSession @belongsTo(fields: ["sessionId"])

  createdAt: AWSDateTime
  updatedAt: AWSDateTime
}
